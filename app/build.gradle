plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.smarttv.launcher'
    compileSdk 34

    defaultConfig {
        applicationId "com.smarttv.launcher"
        minSdk 21
        targetSdk 34
        // Dynamic version injection from CI (gradle -Pandroid.versionCode=N -Pandroid.versionName=X)
        versionCode project.hasProperty('android.versionCode')
            ? project.property('android.versionCode').toInteger()
            : 1
        versionName project.hasProperty('android.versionName')
            ? project.property('android.versionName')
            : "1.0.0"
    }

    // ── Signing configs ──────────────────────────────────────────────────────
    signingConfigs {
        debug {
            // Default debug keystore (auto-generated by Android Studio)
            storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Read from environment variables (set in GitHub Secrets)
            def keystorePath  = System.getenv("KEYSTORE_PATH")  ?: project.findProperty("KEYSTORE_PATH")
            def storePass     = System.getenv("STORE_PASSWORD") ?: project.findProperty("STORE_PASSWORD")
            def alias         = System.getenv("KEY_ALIAS")      ?: project.findProperty("KEY_ALIAS")
            def keyPass       = System.getenv("KEY_PASSWORD")    ?: project.findProperty("KEY_PASSWORD")

            if (keystorePath && storePass && alias && keyPass) {
                storeFile     file(keystorePath)
                storePassword storePass
                keyAlias      alias
                keyPassword   keyPass
            } else {
                // Fallback: use debug keystore if no release keystore configured
                storeFile     file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword 'android'
                keyAlias      'androiddebugkey'
                keyPassword   'android'
                println "⚠️  No release keystore configured — using debug signing for release build"
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            debuggable false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.leanback:leanback:1.0.0'
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
