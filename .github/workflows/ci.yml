name: 🔍 CI – Build Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-check:
    name: 🔨 Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔧 Grant gradlew permission
        run: chmod +x gradlew

      - name: 🔍 Run Lint
        run: ./gradlew lint --stacktrace

      - name: 🔨 Build Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: 📊 Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: ⬆️ Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-pr-${{ github.event.pull_request.number || github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
